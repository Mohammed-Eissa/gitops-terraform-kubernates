---
- name: Check if k3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download k3s install script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: "0755"
  when: not k3s_binary.stat.exists

- name: Install k3s server
  command: >
    /tmp/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    K3S_CLUSTER_INIT: "true"
    INSTALL_K3S_EXEC: >-
      server
      --cluster-cidr={{ k3s_cluster_cidr }}
      --service-cidr={{ k3s_service_cidr }}
      --flannel-backend={{ k3s_flannel_backend }}
      --disable=traefik
      --write-kubeconfig-mode=644
  when: not k3s_binary.stat.exists
  notify: Restart k3s

- name: Wait for k3s to be ready
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 120

- name: Wait for master node to be Ready
  command: k3s kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[-1].type}'
  register: node_status
  until: node_status.stdout == "Ready"
  retries: 20
  delay: 10

- name: Read node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw

- name: Set k3s token fact (shared with agents)
  set_fact:
    k3s_token: "{{ k3s_token_raw.content | b64decode | trim }}"

- name: Fetch kubeconfig to local machine
  fetch:
    src: "{{ k3s_kubeconfig_remote }}"
    dest: "{{ k3s_kubeconfig_local }}"
    flat: true
  become: true

- name: Replace 127.0.0.1 with master IP in local kubeconfig
  delegate_to: localhost
  become: false
  replace:
    path: "{{ k3s_kubeconfig_local }}"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ k3s_master_ip }}:6443"
