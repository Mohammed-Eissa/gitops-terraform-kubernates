---
- name: Check if k3s agent is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download k3s install script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: "0755"
  when: not k3s_binary.stat.exists

- name: Install k3s agent
  command: /tmp/k3s-install.sh
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    K3S_URL: "https://{{ k3s_master_ip }}:6443"
    K3S_TOKEN: "{{ hostvars[groups['master'][0]]['k3s_token'] }}"
    INSTALL_K3S_EXEC: "agent"
  when: not k3s_binary.stat.exists
  notify: Restart k3s-agent

- name: Wait for agent to appear in cluster
  delegate_to: "{{ groups['master'][0] }}"
  command: k3s kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[-1].type}'
  register: node_status
  until: node_status.stdout == "Ready"
  retries: 20
  delay: 10
