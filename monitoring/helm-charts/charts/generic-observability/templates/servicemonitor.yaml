apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: '{{ include "generic-observability.fullname" . }}-nginx-ingress'
  namespace: '{{ .Values.monitoringNamespace }}'
  labels:
    helm.sh/chart: '{{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/name: '{{ include "generic-observability.name" . }}'
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/managed-by: '{{ .Release.Service }}'
    app.kubernetes.io/component: nginx-ingress-monitor
    # Prometheus Operator uses this label to discover the monitor.
spec:
  # Scrape targets in the ingress-nginx namespace.
  namespaceSelector:
    matchNames:
      - '{{ .Values.nginxIngress.namespace }}'
  selector:
    matchLabels:
      app.kubernetes.io/name: '{{ index .Values.nginxIngress.selector.matchLabels "app.kubernetes.io/name" | default "ingress-nginx" }}'
  endpoints:
    - port: '{{ .Values.nginxIngress.portName }}'
      path: '{{ .Values.nginxIngress.path }}'
      interval: '{{ .Values.nginxIngress.scrapeInterval }}'
      scheme: http
      # Relabelling keeps the ingress controller's pod name and namespace
      # available as Prometheus labels for per-ingress filtering.
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
